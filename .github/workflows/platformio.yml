name: PlatformIO

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platformio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  avr-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Build AVR firmware
        run: pio run -e pro16MHzatmega328

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Run native tests
        run: pio test -e native

  simulator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0
      - name: Install simulator test dependencies
        run: python -m pip install -r simulator/requirements.txt
      - name: Run simulator tests
        run: python -m pytest -q simulator/tests
        env:
          PYTHONPATH: simulator
          QT_QPA_PLATFORM: offscreen

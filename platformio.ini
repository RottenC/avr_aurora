[env:pro16MHzatmega328]
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.9.15

; Apply strict diagnostics only to this project's src/ files.
; Dependencies and the Arduino framework keep their own compiler defaults.
build_src_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic

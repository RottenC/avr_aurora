[env:pro16MHzatmega328]
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.9.15

extra_scripts =
    post:scripts/quiet_dependencies.py

; Apply strict diagnostics only to this project's src/ files.
build_src_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic
    -Isrc
build_src_filter =
    +<pc_state.cpp>
    +<effect_controller.cpp>
    +<power_led_tracker.cpp>
    +<hdd_activity.cpp>
